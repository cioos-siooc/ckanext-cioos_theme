{#
  Enhanced home page search bar (v2).
  Designed to be placed inside a <form> in default_home_v2.html.
#}
{% set placeholder = _('Search ocean data...') %}

<div class="home-search-bar">
  <div class="home-search-input-group">
    <input
      aria-label="{% block header_site_search_label %}{{ _('Search datasets') }}{% endblock %}"
      id="field-main-search"
      type="text"
      class="home-search-input"
      name="q"
      value=""
      autocomplete="off"
      placeholder="{% block search_placeholder %}{{ placeholder }}{% endblock %}"
      title="{{ _('Press / to focus') }}"
    />
    <button type="submit" class="home-search-btn" title="{{ _('Press / to focus') }}">
      <i class="fas fa-search"></i>
    </button>
  </div>
</div>
